version: '3.8'

services:
  # Base de Datos MySQL
  mysql:
    image: mysql:8-alpine
    container_name: ez-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: ez_dtabse
      MYSQL_USER: ez_user
      MYSQL_PASSWORD: ez_password
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./Script_Ez.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - ez-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Backend Spring Boot
  ez-backend:
    build:
      context: ./Ez_back
      dockerfile: ../Dockerfile
    container_name: ez-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ez_dtabse?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ez_user
      SPRING_DATASOURCE_PASSWORD: ez_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-MiClaveSecretaSuperSegura}
      JWT_EXPIRATION: 86400000
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN:-TEST-3130995303619357}
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      APP_MAIL_FROM: ${MAIL_FROM:-noreply@ez-platform.com}
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ez-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    volumes:
      - ./Ez_back:/app/source:ro

  # Frontend React con Nginx
  ez-frontend:
    build:
      context: ./Ez_front
      dockerfile: Dockerfile
    container_name: ez-frontend
    ports:
      - "3000:3000"
    depends_on:
      - ez-backend
    networks:
      - ez-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080/api}

networks:
  ez-network:
    driver: bridge

volumes:
  mysql-data:
    driver: local
